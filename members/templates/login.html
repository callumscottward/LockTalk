{% extends 'master.html' %}

{% block title %}
    Login
{% endblock %}

{% block content %}
    
    <h1>Welcome to LockTock</h1>
    <div style="max-width: 500px; margin: 50px auto; padding: 20px;">
        <h2>Login</h2>
        {% if messages %}
            {% for message in messages %}
                <div style="color:red; margin-bottom: 10px;">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST" style="display: flex; flex-direction: column; gap: 15px;">
            {% csrf_token %}
            <div>
                <label for="email">Email:</label>
                <input type="text" name="email" id="email" required style="width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box;">
            </div>

            <div>
                <label for="password">Password:</label>
                <input type="password" name="password" id="password" required style="width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box;">
            </div>

            <button type="submit" style="padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px;">Login</button>
        </form>
        
        <p style="margin-top: 20px;">
            <strong>Don't have an account?</strong>
            <a href="/signup/"> Sign Up Now</a>
        </p>
    </div>
{% endblock %}
